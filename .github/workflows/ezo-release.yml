name: EZOCustomSupportIcons release package

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version metadata
        shell: pwsh
        run: .\tools\bump-version.ps1 -Check

      - name: Build clean addon ZIP
        shell: pwsh
        run: .\scripts\ezo\build-addon-package.ps1 -Force

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: EZOCustomSupportIcons-release-package
          path: dist/*.zip
          if-no-files-found: error
