name: EZOCustomSupportIcons status

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version metadata
        shell: pwsh
        run: .\tools\bump-version.ps1 -Check

      - name: Check whitespace
        shell: pwsh
        run: git diff --check
